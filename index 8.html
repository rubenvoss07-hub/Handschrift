:root{
  --desk:#cfc8ba;
  --desk2:#bdb5a4;
  --ink-ui:#3b3a36;
  --panel:#ffffff;
  --line:#e6e2d8;
  --muted:#8a857a;
  --accent:#c75b1e;
  --accent2:#e07a3c;
  --ok:#3d8b40;
  --shadow:0 10px 30px rgba(40,32,20,.18);
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  font:14px/1.45 "Segoe UI",system-ui,-apple-system,sans-serif;
  color:var(--ink-ui);
  background:linear-gradient(135deg,var(--desk),var(--desk2));
  display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;
}
.topbar{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:12px 18px;background:rgba(255,255,255,.72);
  backdrop-filter:blur(6px);border-bottom:1px solid rgba(0,0,0,.06);
  position:sticky;top:0;z-index:20;
}
.brand{font-size:18px;font-weight:700;letter-spacing:.2px;}
.brand .pen{color:var(--accent);}
.actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;}
button{
  font:inherit;font-weight:600;cursor:pointer;border:1px solid rgba(0,0,0,.12);
  background:#fff;color:var(--ink-ui);padding:8px 14px;border-radius:9px;
  transition:transform .06s ease,box-shadow .15s ease,background .15s ease;
}
button:hover{box-shadow:0 3px 10px rgba(0,0,0,.12);}
button:active{transform:translateY(1px);}
button.primary{background:linear-gradient(180deg,var(--accent2),var(--accent));color:#fff;border-color:transparent;}
button.ghost{background:transparent;}
.main{display:flex;gap:20px;padding:20px;flex:1;align-items:flex-start;}
.panel{
  width:320px;flex:0 0 320px;background:var(--panel);border-radius:16px;
  box-shadow:var(--shadow);padding:18px;position:sticky;top:78px;
  max-height:calc(100dvh - 100px);overflow:auto;
}
.panel h2{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:18px 0 8px;}
.panel h2:first-child{margin-top:0;}
textarea{
  width:100%;min-height:140px;resize:vertical;border:1px solid var(--line);
  border-radius:10px;padding:10px 11px;font:14px/1.5 "Segoe UI",system-ui,sans-serif;
  color:var(--ink-ui);background:#fcfbf8;
}
textarea:focus,input:focus{outline:2px solid var(--accent2);outline-offset:1px;}
.fontlist{display:flex;flex-direction:column;gap:6px;}
.fontrow{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--line);border-radius:9px;cursor:pointer;background:#fcfbf8;}
.fontrow.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);background:#fff;}
.fontrow .fname{flex:1;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fontrow .tag{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.fontrow .icon{border:none;background:none;padding:2px 4px;font-size:13px;color:var(--muted);}
.fontrow .icon:hover{color:var(--accent);box-shadow:none;}
.fontbtns{display:flex;gap:8px;margin-top:8px;}
.fontbtns button{flex:1;padding:7px 8px;font-size:12.5px;}
.swatches{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.sw{width:26px;height:26px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.18);cursor:pointer;padding:0;}
.sw.active{box-shadow:0 0 0 2px var(--accent),0 0 0 4px rgba(0,0,0,.08);}
input[type=color]{width:34px;height:30px;padding:0;border:1px solid var(--line);border-radius:7px;background:#fff;cursor:pointer;}
.ctrl{margin:12px 0;}
.ctrl .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.ctrl label{font-weight:600;font-size:13px;}
.ctrl .val{font-variant-numeric:tabular-nums;color:var(--accent);font-weight:700;font-size:12px;}
input[type=range]{width:100%;accent-color:var(--accent);}
.check{display:flex;align-items:center;gap:8px;margin:10px 0;cursor:pointer;font-weight:600;}
.check input{width:16px;height:16px;accent-color:var(--accent);}
.tiny{display:flex;gap:8px;margin-top:14px;border-top:1px solid var(--line);padding-top:12px;}
.tiny button{flex:1;font-size:12px;padding:6px 8px;color:var(--muted);}
.preview{flex:1;display:flex;flex-direction:column;align-items:center;gap:18px;min-width:0;}
.sheet{background:#fff;border-radius:4px;box-shadow:var(--shadow);width:min(100%,520px);height:auto;display:block;}
.cap{font-size:12px;color:#5a554b;background:rgba(255,255,255,.55);padding:3px 12px;border-radius:20px;}
.empty{color:#6b665b;text-align:center;padding:40px;}
.modal{position:fixed;inset:0;background:rgba(40,35,25,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:14px;}
.modal.open{display:flex;}
.sheetbox{background:#fff;border-radius:16px;box-shadow:var(--shadow);width:min(560px,100%);max-height:100dvh;overflow:auto;padding:16px;}
.mhead{display:flex;gap:10px;align-items:center;margin-bottom:8px;}
.mhead input{flex:1;border:1px solid var(--line);border-radius:8px;padding:7px 10px;font:inherit;font-weight:600;min-width:0;}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0;max-height:104px;overflow:auto;}
.chip{width:30px;height:30px;border-radius:7px;border:1px solid var(--line);background:#fcfbf8;font:15px/1 "Segoe UI",system-ui,sans-serif;padding:0;}
.chip.done{background:#e4f2e4;border-color:#bcd9bd;color:var(--ok);}
.chip.cur{outline:2px solid var(--accent);outline-offset:-1px;}
#draw{touch-action:none;display:block;width:100%;height:auto;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:crosshair;}
.mrow{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap;}
.mrow .grow{flex:1;}
.mrow input[type=range]{width:110px;}
.curchar{font-size:22px;font-weight:700;width:36px;text-align:center;color:var(--accent);flex:none;}
@media (max-width:820px){
  .main{flex-direction:column;}
  .panel{width:100%;flex:none;position:static;max-height:none;}
}

<body>
<div class="topbar">
  <div class="brand"><span class="pen">&#9999;&#65039;</span> Handwriting Studio</div>
  <div class="actions">
    <button id="reroll" class="ghost">&#8635; Re&#8209;roll</button>
    <button id="png">PNG</button>
    <button id="pdf" class="primary">PDF</button>
  </div>
</div>

<div class="main">
  <aside class="panel">
    <h2>Font</h2>
    <div class="fontlist" id="fontlist"></div>
    <div class="fontbtns">
      <button id="drawfont">&#9998; Draw new</button>
      <button id="upload">&#8682; Upload .ttf</button>
      <input type="file" id="uploadFile" accept=".ttf,.otf" hidden>
    </div>

    <h2>Text</h2>
    <textarea id="text" spellcheck="false" placeholder='Blank line = gap &middot; start a line with "# " for a printed heading'></textarea>

    <h2>Ink</h2>
    <div class="swatches" id="swatches">
      <button class="sw" data-c="#e67300" style="background:#e67300"></button>
      <button class="sw" data-c="#14145a" style="background:#14145a"></button>
      <button class="sw" data-c="#141414" style="background:#141414"></button>
      <button class="sw" data-c="#1e5ac8" style="background:#1e5ac8"></button>
      <input type="color" id="ink" value="#e67300">
    </div>

    <h2>Style</h2>
    <div class="ctrl">
      <div class="row"><label for="fontSize">Font size</label><span class="val" id="fontSizeV">26 pt</span></div>
      <input type="range" id="fontSize" min="16" max="40" step="1" value="26">
    </div>
    <div class="ctrl">
      <div class="row"><label for="sizeVar">Size jitter</label><span class="val" id="sizeVarV">4 %</span></div>
      <input type="range" id="sizeVar" min="0" max="12" step="0.5" value="4">
    </div>
    <div class="ctrl">
      <div class="row"><label for="rotVar">Rotation jitter</label><span class="val" id="rotVarV">2.5&deg;</span></div>
      <input type="range" id="rotVar" min="0" max="8" step="0.1" value="2.5">
    </div>

      <div class="row"><label for="charSpacing">Letter spacing</label><span class="val" id="charSpacingV">0.75</span></div>

      <div class="row"><label for="wordSpace">Word spacing</label><span class="val" id="wordSpaceV">8 pt</span></div>
      <input type="range" id="wordSpace" min="0" max="20" step="0.5" value="8">
    </div>
    <label class="check"><input type="checkbox" id="showLines" checked> Ruled lines</label>

    <div class="tiny">
      <button id="backup" class="ghost">&#10515; Backup</button>
      <button id="restore" class="ghost">&#10514; Restore</button>
      <input type="file" id="restoreFile" accept=".json" hidden>
    </div>
  </aside>

  <section class="preview" id="preview">
    <div class="empty">Loading&hellip;</div>

</div>

<!-- Font creator -->

  <div class="sheetbox">
    <div class="mhead">
      <input id="fname" placeholder="Font name" maxlength="40">
      <button id="csave" class="primary">Save font</button>
      <button id="cclose" class="ghost">&#10005;</button>
    </div>
    <div class="chips" id="chips"></div>
    <canvas id="draw" width="460" height="340"></canvas>
    <div class="mrow">
      <button id="cprev">&#8249;</button>
      <div class="curchar" id="curchar">a</div>
      <button id="cnext">&#8250;</button>

      <label style="font-size:12px;font-weight:600">Pen</label>
      <input type="range" id="cpen" min="2" max="14" step="0.5" value="6">
      <button id="cundo">Undo</button>
      <button id="cclear">Clear</button>
    </div>
  </div>
</div>

<script>
"use strict";

/* ================= Skill constants ================= */
const PAGE_W = 595.28, PAGE_H = 841.89;   // A4 in points
const BG_LINE_SPACING = 17.5;
const BG_FIRST_LINE_Y = 791.4;
const BG_LAST_LINE_Y  = 21.4;
const TEXT_OFFSET = 1;
const MARGIN = 28;
const SCALE = 3;                           // device px per pt
const MATH_CHARS = new Set([..."0123456789~ °±²³·¼½×Ø÷ø–‰′″√∛∞≈≝≠≡≤≥"]);

/* ================= Seeded RNG ================= */
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
let rng = Math.random;
function gauss(mean, sd){
  let u = 0, v = 0;
  while (u === 0) u = rng();
  while (v === 0) v = rng();
  return mean + sd * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

/* ================= State & persistence ================= */
const BUILTIN = { id:'builtin', name:'Skill handwriting', type:'builtin' };
const state = {
  fonts: [],            // custom fonts: {id,name,type:'ttf'|'drawn',...}
  selected: 'builtin',
  settings: { ink:'#e67300', fontSize:26, sizeVar:4, rotVar:2.5, charSpacing:0.75, wordSpace:8, showLines:true },
  text: "Hallo! Dieser Text wird in meiner eigenen Handschrift gerendert.\n\nMathe: √9 = 3, x ≤ 10°, ¼ + ¼ = ½\n\n# Gedruckte Überschrift\nGemischt: getippt und handschriftlich.",
};
function lsGet(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }
function lsSet(k,v){ try { localStorage.setItem(k,v); return true; } catch(e){ alert('Could not save (storage full or blocked).'); return false; } }
function loadState(){
  try {
    const cfg = JSON.parse(lsGet('hwstudio.config') || 'null');
    if (cfg){ Object.assign(state.settings, cfg.settings || {}); state.selected = cfg.selected || 'builtin'; if (typeof cfg.text === 'string') state.text = cfg.text; }
    const fonts = JSON.parse(lsGet('hwstudio.fonts') || 'null');
    if (Array.isArray(fonts)) state.fonts = fonts;
  } catch(e){}
  if (state.selected !== 'builtin' && !state.fonts.some(f => f.id === state.selected)) state.selected = 'builtin';
}
let saveT = null;
function saveState(){
  clearTimeout(saveT);
  saveT = setTimeout(() => {
    lsSet('hwstudio.config', JSON.stringify({ settings: state.settings, selected: state.selected, text: state.text }));
  }, 250);
}
function saveFonts(){ lsSet('hwstudio.fonts', JSON.stringify(state.fonts)); }
function currentFont(){ return state.fonts.find(f => f.id === state.selected) || BUILTIN; }

/* ================= TTF registration + cmap coverage ================= */
function b64ToBuf(b64){
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out.buffer;
}
function parseCmap(buf){
  try {
    const dv = new DataView(buf);
    let off = 0;
    if (dv.getUint32(0) === 0x74746366) off = dv.getUint32(12);        // 'ttcf' → first font
    const numTables = dv.getUint16(off + 4);
    let cmapOff = 0;
    for (let i = 0; i < numTables; i++){
      const p = off + 12 + i * 16;
      if (dv.getUint32(p) === 0x636d6170) cmapOff = dv.getUint32(p + 8); // 'cmap'
    }
    if (!cmapOff) return null;
    const n = dv.getUint16(cmapOff + 2);
    let best = 0, bestScore = -1;
    for (let i = 0; i < n; i++){
      const p = cmapOff + 4 + i * 8;
      const pid = dv.getUint16(p), eid = dv.getUint16(p + 2);
      const so = cmapOff + dv.getUint32(p + 4);
      const fmt = dv.getUint16(so);
      let score = -1;
      if (pid === 3 && eid === 10 && fmt === 12) score = 5;
      else if (pid === 3 && eid === 1 && fmt === 4) score = 4;
      else if (pid === 0 && (fmt === 4 || fmt === 12)) score = 3;
      else if (pid === 3 && eid === 0 && fmt === 4) score = 2;
      if (score > bestScore){ bestScore = score; best = so; }
    }
    if (bestScore < 0) return null;
    const fmt = dv.getUint16(best), set = new Set();
    if (fmt === 4){
      const segX2 = dv.getUint16(best + 6);
      const endP = best + 14, startP = endP + segX2 + 2, deltaP = startP + segX2, rangeP = deltaP + segX2;
      for (let s = 0; s < segX2 / 2; s++){
        const end = dv.getUint16(endP + s * 2), start = dv.getUint16(startP + s * 2);
        if (start === 0xFFFF) continue;
        const delta = dv.getUint16(deltaP + s * 2), ro = dv.getUint16(rangeP + s * 2);
        for (let c = start; c <= end; c++){
          let g;
          if (ro === 0) g = (c + delta) & 0xFFFF;
          else {
            const gi = rangeP + s * 2 + ro + (c - start) * 2;
            if (gi + 1 >= buf.byteLength) continue;
            g = dv.getUint16(gi);
            if (g !== 0) g = (g + delta) & 0xFFFF;
          }
          if (g !== 0) set.add(c);
        }
      }
    } else if (fmt === 12){
      const nG = dv.getUint32(best + 12);
      for (let g = 0; g < nG; g++){
        const p = best + 16 + g * 12;
        const s = dv.getUint32(p), e = dv.getUint32(p + 4);
        for (let c = s; c <= e && c - s < 100000; c++) set.add(c);
      }
    } else return null;
    return set;
  } catch(e){ return null; }
}
const faceHandles = {};   // id → FontFace
const coverage = {};      // id → Set|null
async function registerTTF(rec){
  const buf = b64ToBuf(rec.data);
  coverage[rec.id] = parseCmap(buf);
  const ff = new FontFace('UF' + rec.id, buf);
  await ff.load();
  document.fonts.add(ff);
  faceHandles[rec.id] = ff;
}
function unregisterTTF(id){
  if (faceHandles[id]){ try { document.fonts.delete(faceHandles[id]); } catch(e){} delete faceHandles[id]; }
  delete coverage[id];
}

/* ================= Char resolution & metrics ================= */
const mctx = document.createElement('canvas').getContext('2d');
function measure(ch, fam, sizePt){ mctx.font = sizePt + 'px "' + fam + '"'; return mctx.measureText(ch).width; }

function resolveChar(ch){
  const f = currentFont();
  if (f.type === 'drawn' && f.glyphs[ch]) return { kind:'drawn', font:f, ch };
  if (f.type === 'ttf'){
    const cov = coverage[f.id];
    if (!cov || cov.has(ch.codePointAt(0))) return { kind:'ttf', fam:'UF' + f.id, ch };
  }
  const n = ch === '-' ? '–' : ch;   // hyphen → en dash (math font has it)
  return { kind:'ttf', fam: MATH_CHARS.has(n) ? 'HWMath' : 'HW', ch:n };
}
function advance(ch, base){
  const r = resolveChar(ch);
  return r.kind === 'drawn' ? r.font.glyphs[r.ch].adv * base : measure(r.ch, r.fam, base);
}
function spaceAdvance(base){
  const f = currentFont();
  if (f.type === 'drawn') return (f.glyphs[' '] ? f.glyphs[' '].adv : 0.30) * base;
  if (f.type === 'ttf'){ const cov = coverage[f.id]; if (!cov || cov.has(32)) return measure(' ', 'UF' + f.id, base); }
  return measure(' ', 'HW', base);
}

/* ================= Layout ================= */
function layout(s){
  const usable = PAGE_W - 2 * MARGIN;
  const spaceW = spaceAdvance(s.fontSize) * s.charSpacing + s.wordSpace * (s.fontSize / 28);
  function wordWidth(word){
    let w = 0;
    for (const ch of word) w += advance(ch, s.fontSize) * s.charSpacing;
    return w;
  }
  const lines = [];
  for (const para of state.text.split('\n')){
    if (para.startsWith('# ')){ lines.push({type:'heading', text: para.slice(2)}); continue; }
    if (para.trim() === ''){ lines.push({type:'gap'}); continue; }
    const words = para.split(' ').filter(w => w.length);
    let cur = [], curW = 0;
    for (const word of words){
      const ww = wordWidth(word);
      const extra = cur.length ? spaceW : 0;
      if (curW + extra + ww <= usable || !cur.length){ cur.push(word); curW += extra + ww; }
      else { lines.push({type:'hw', words: cur}); cur = [word]; curW = ww; }
    }
    lines.push({type:'hw', words: cur});
  }
  const pages = [];
  let page = [], pdfY = BG_FIRST_LINE_Y + TEXT_OFFSET;
  for (const ln of lines){
    if (pdfY < BG_LAST_LINE_Y){ pages.push(page); page = []; pdfY = BG_FIRST_LINE_Y + TEXT_OFFSET; }
    ln.pdfY = pdfY;
    page.push(ln);
    pdfY -= BG_LINE_SPACING;
  }
  pages.push(page);
  return { pages, spaceW };
}

/* ================= Stroke path (shared: creator + renderer) ================= */
function strokePath(ctx, pts){
  ctx.beginPath();
  if (pts.length === 1){
    ctx.moveTo(pts[0][0], pts[0][1]);
    ctx.lineTo(pts[0][0] + 0.0001, pts[0][1]);
  } else {
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length - 1; i++){
      const mx = (pts[i][0] + pts[i+1][0]) / 2, my = (pts[i][1] + pts[i+1][1]) / 2;
      ctx.quadraticCurveTo(pts[i][0], pts[i][1], mx, my);
    }
    const L = pts[pts.length - 1];
    ctx.lineTo(L[0], L[1]);
  }
  ctx.stroke();
}

/* ================= Page rendering ================= */
function renderPage(pageLines, s, spaceW){
  const cv = document.createElement('canvas');
  cv.width = Math.round(PAGE_W * SCALE);
  cv.height = Math.round(PAGE_H * SCALE);
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, cv.width, cv.height);

  if (s.showLines){
    ctx.strokeStyle = 'rgba(120,165,210,.55)';
    ctx.lineWidth = 1;
    for (let y = BG_FIRST_LINE_Y; y >= BG_LAST_LINE_Y - 0.01; y -= BG_LINE_SPACING){
      const top = (PAGE_H - y) * SCALE;
      ctx.beginPath();
      ctx.moveTo(MARGIN * SCALE * 0.5, top);
      ctx.lineTo(cv.width - MARGIN * SCALE * 0.5, top);
      ctx.stroke();
    }
  }

  function drawChar(ch, x, topPt){
    const r = resolveChar(ch);
    const base = s.fontSize;
    const actual = Math.max(base * 0.85, base + gauss(0, s.sizeVar / 100) * base);
    ctx.save();
    ctx.translate(x * SCALE, topPt * SCALE);
    ctx.rotate(gauss(0, s.rotVar) * Math.PI / 180);
    if (r.kind === 'ttf'){
      ctx.fillStyle = s.ink;
      ctx.font = (actual * SCALE) + 'px "' + r.fam + '"';
      ctx.fillText(r.ch, 0, 0);
    } else {
      const g = r.font.glyphs[r.ch];
      ctx.scale(actual * SCALE, actual * SCALE);
      ctx.strokeStyle = s.ink;
      ctx.lineWidth = r.font.penEm;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      for (const st of g.strokes) strokePath(ctx, st);
    }
    ctx.restore();
    return r.kind === 'drawn' ? r.font.glyphs[r.ch].adv * base : measure(r.ch, r.fam, base);
  }

  for (const ln of pageLines){
    const top = PAGE_H - ln.pdfY; // baseline distance from top, pts
    if (ln.type === 'heading'){
      ctx.fillStyle = '#161616';
      ctx.font = 'bold ' + (11 * SCALE) + 'px "Segoe UI",system-ui,sans-serif';
      ctx.fillText(ln.text, MARGIN * SCALE, top * SCALE);
    } else if (ln.type === 'hw'){
      let x = MARGIN;
      for (let i = 0; i < ln.words.length; i++){
        for (const ch of ln.words[i]) x += drawChar(ch, x, top) * s.charSpacing;
        if (i < ln.words.length - 1) x += spaceW;
      }
    }
  }
  return cv;
}

/* ================= PDF builder (image-based, no deps) ================= */
function dataURItoBytes(uri){
  const b = atob(uri.split(',')[1]);
  const out = new Uint8Array(b.length);
  for (let i = 0; i < b.length; i++) out[i] = b.charCodeAt(i);
  return out;
}
function buildPDF(canvases){
  const enc = new TextEncoder();
  const chunks = []; let len = 0; const offsets = [];
  const push = u => { chunks.push(u); len += u.length; };
  const pushStr = str => push(enc.encode(str));
  const obj = n => { offsets[n] = len; };

  push(new Uint8Array([0x25,0x50,0x44,0x46,0x2d,0x31,0x2e,0x33,0x0a,0x25,0xe2,0xe3,0xcf,0xd3,0x0a]));

  const N = canvases.length;
  obj(1); pushStr("1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n");
  let kids = "";
  for (let i = 0; i < N; i++) kids += (3 + i*3) + " 0 R ";
  obj(2); pushStr("2 0 obj\n<< /Type /Pages /Kids [ " + kids + "] /Count " + N + " >>\nendobj\n");

  for (let i = 0; i < N; i++){
    const cv = canvases[i];
    const jpeg = dataURItoBytes(cv.toDataURL('image/jpeg', 0.92));
    const pageObj = 3 + i*3, contentObj = 4 + i*3, imgObj = 5 + i*3;
    const content = "q\n" + PAGE_W + " 0 0 " + PAGE_H + " 0 0 cm\n/Im0 Do\nQ\n";

    obj(pageObj);
    pushStr(pageObj + " 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 " + PAGE_W + " " + PAGE_H +
            "] /Resources << /XObject << /Im0 " + imgObj + " 0 R >> >> /Contents " + contentObj + " 0 R >>\nendobj\n");

    obj(contentObj);
    pushStr(contentObj + " 0 obj\n<< /Length " + content.length + " >>\nstream\n" + content + "endstream\nendobj\n");

    obj(imgObj);
    pushStr(imgObj + " 0 obj\n<< /Type /XObject /Subtype /Image /Width " + cv.width + " /Height " + cv.height +
            " /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length " + jpeg.length + " >>\nstream\n");
    push(jpeg);
    pushStr("\nendstream\nendobj\n");
  }

  const total = 2 + N*3;
  const xrefStart = len;
  let xref = "xref\n0 " + (total + 1) + "\n0000000000 65535 f \n";
  for (let n = 1; n <= total; n++) xref += String(offsets[n]).padStart(10, '0') + " 00000 n \n";
  pushStr(xref);
  pushStr("trailer\n<< /Size " + (total + 1) + " /Root 1 0 R >>\nstartxref\n" + xrefStart + "\n%%EOF\n");
  return new Blob(chunks, { type: 'application/pdf' });
}

/* ================= Main render ================= */
function el(id){ return document.getElementById(id); }
let currentSeed = (Math.random() * 1e9) | 0;
let pageCanvases = [];

function render(){
  const s = state.settings;
  rng = mulberry32(currentSeed);
  const { pages, spaceW } = layout(s);
  pageCanvases = pages.map(p => renderPage(p, s, spaceW));
  const prev = el('preview');
  prev.innerHTML = '';
  pageCanvases.forEach((cv, i) => {
    cv.className = 'sheet';
    prev.appendChild(cv);
    const cap = document.createElement('div');
    cap.className = 'cap';
    cap.textContent = (i + 1) + ' / ' + pageCanvases.length;
    prev.appendChild(cap);
  });
  saveState();
}
let rT = null;
function schedule(){ clearTimeout(rT); rT = setTimeout(render, 140); }

function download(blob, name){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; document.body.appendChild(a); a.click();
  a.remove(); setTimeout(() => URL.revokeObjectURL(url), 2000);
}

/* ================= Font list UI ================= */
function renderFontList(){
  const box = el('fontlist');
  box.innerHTML = '';
  const all = [BUILTIN, ...state.fonts];
  for (const f of all){
    const row = document.createElement('div');
    row.className = 'fontrow' + (f.id === state.selected ? ' active' : '');
    const name = document.createElement('span');
    name.className = 'fname';
    name.textContent = f.name;
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = f.type === 'ttf' ? 'ttf' : f.type === 'drawn' ? 'drawn' : 'built-in';
    row.append(name, tag);
    if (f.type === 'drawn'){
      const edit = document.createElement('button');
      edit.className = 'icon'; edit.textContent = '✎';
      edit.addEventListener('click', e => { e.stopPropagation(); openCreator(f); });
      row.appendChild(edit);
    }
    if (f.id !== 'builtin'){
      const del = document.createElement('button');
      del.className = 'icon'; del.textContent = '✕';
      del.addEventListener('click', e => {
        e.stopPropagation();
        if (!confirm('Delete font "' + f.name + '"?')) return;
        if (f.type === 'ttf') unregisterTTF(f.id);
        state.fonts = state.fonts.filter(x => x.id !== f.id);
        if (state.selected === f.id) state.selected = 'builtin';
        saveFonts(); renderFontList(); render();
      });
      row.appendChild(del);
    }
    row.addEventListener('click', () => { state.selected = f.id; renderFontList(); render(); });
    box.appendChild(row);
  }
}

/* ================= TTF upload ================= */
el('upload').addEventListener('click', () => el('uploadFile').click());
el('uploadFile').addEventListener('change', async e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let bin = '';
  for (let i = 0; i < bytes.length; i += 0x8000) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
  const rec = { id: 'f' + Date.now(), name: file.name.replace(/\.(ttf|otf)$/i, ''), type: 'ttf', data: btoa(bin) };
  try { await registerTTF(rec); }
  catch(err){ alert('Could not load this font file.'); return; }
  state.fonts.push(rec);
  state.selected = rec.id;
  saveFonts(); renderFontList(); render();
});

/* ================= Font creator (draw your own) ================= */
const CREATOR_CHARS = [...new Set([
  ..."abcdefghijklmnopqrstuvwxyz",
  ..."ABCDEFGHIJKLMNOPQRSTUVWXYZ",
  ..."äöüÄÖÜß",
  ..."0123456789",
  ...".,;:!?'\"()[]-–+=*/\\&@#%<>",
  ..."°±²³·¼½×÷√∞≈≠≤≥~",
])];
const CW = 460, CH = 340, CBASE = 240, CEM = 170, CPAD = 40, BEAR = 0.04;
let working = null;       // font being edited (deep copy)
let editingId = null;     // id of existing font, or null for new
let curChar = 'a';
let curStrokes = [];      // strokes of current char, canvas coords
let liveStroke = null;
let dirty = false;
const dcv = el('draw');
const dctx = dcv.getContext('2d');
const dpr = Math.max(1, window.devicePixelRatio || 1);
dcv.width = CW * dpr; dcv.height = CH * dpr;
dcv.style.aspectRatio = CW + ' / ' + CH;

function redrawCreator(){
  dctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  dctx.clearRect(0, 0, CW, CH);
  // guides
  const guides = [
    [CBASE - 0.72 * CEM, 'rgba(0,0,0,.10)', []],
    [CBASE - 0.47 * CEM, 'rgba(70,130,200,.30)', []],
    [CBASE,              'rgba(200,90,30,.55)', []],
    [CBASE + 0.22 * CEM, 'rgba(0,0,0,.10)', [5,5]],
  ];
  for (const [y, col, dash] of guides){
    dctx.strokeStyle = col; dctx.lineWidth = 1; dctx.setLineDash(dash);
    dctx.beginPath(); dctx.moveTo(8, y); dctx.lineTo(CW - 8, y); dctx.stroke();
  }
  dctx.setLineDash([]);
  // ghost reference letter
  dctx.fillStyle = 'rgba(0,0,0,.07)';
  dctx.font = CEM + 'px "Segoe UI",system-ui,sans-serif';
  dctx.textAlign = 'center';
  dctx.fillText(curChar, CW / 2, CBASE);
  dctx.textAlign = 'left';
  // strokes
  dctx.strokeStyle = '#222';
  dctx.lineWidth = +el('cpen').value;
  dctx.lineCap = 'round'; dctx.lineJoin = 'round';
  for (const st of curStrokes) strokePath(dctx, st);
  if (liveStroke) strokePath(dctx, liveStroke);
}

function canvasGlyphFromStored(g){
  return g.strokes.map(st => st.map(([x, y]) => [x * CEM + CPAD, y * CEM + CBASE]));
}
function storeCurrentChar(){
  if (!curStrokes.length){ delete working.glyphs[curChar]; return; }
  let minX = 1e9, maxX = -1e9;
  for (const st of curStrokes) for (const [x] of st){ if (x < minX) minX = x; if (x > maxX) maxX = x; }
  const r4 = v => Math.round(v * 1e4) / 1e4;
  const strokes = curStrokes.map(st => st.map(([x, y]) => [r4((x - minX) / CEM + BEAR), r4((y - CBASE) / CEM)]));
  working.glyphs[curChar] = { strokes, adv: r4((maxX - minX) / CEM + 2 * BEAR) };
}
function loadChar(ch){
  storeCurrentChar();
  curChar = ch;
  el('curchar').textContent = ch;
  const g = working.glyphs[ch];
  curStrokes = g ? canvasGlyphFromStored(g) : [];
  refreshChips();
  redrawCreator();
}
function refreshChips(){
  for (const b of el('chips').children){
    b.classList.toggle('done', !!working.glyphs[b.textContent] || (b.textContent === curChar && curStrokes.length > 0));
    b.classList.toggle('cur', b.textContent === curChar);
  }
}
function buildChips(){
  const box = el('chips');
  box.innerHTML = '';
  for (const ch of CREATOR_CHARS){
    const b = document.createElement('button');
    b.className = 'chip';
    b.textContent = ch;
    b.addEventListener('click', () => loadChar(ch));
    box.appendChild(b);
  }
}
function openCreator(font){
  if (font){
    editingId = font.id;
    working = JSON.parse(JSON.stringify(font));
  } else {
    editingId = null;
    working = { id: 'f' + Date.now(), name: 'My handwriting', type: 'drawn', penEm: 6 / CEM, glyphs: {} };
  }
  el('fname').value = working.name;
  el('cpen').value = Math.round(working.penEm * CEM * 2) / 2;
  curChar = 'a'; curStrokes = working.glyphs['a'] ? canvasGlyphFromStored(working.glyphs['a']) : [];
  dirty = false;
  buildChips(); refreshChips(); redrawCreator();
  el('creator').classList.add('open');
}
function closeCreator(){
  if (dirty && !confirm('Discard unsaved changes?')) return;
  el('creator').classList.remove('open');
  working = null;
}
el('drawfont').addEventListener('click', () => openCreator(null));
el('cclose').addEventListener('click', closeCreator);
el('csave').addEventListener('click', () => {
  storeCurrentChar();
  working.name = el('fname').value.trim() || 'My handwriting';
  working.penEm = +el('cpen').value / CEM;
  if (!Object.keys(working.glyphs).length){ alert('Draw at least one character first.'); return; }
  if (editingId){
    const i = state.fonts.findIndex(f => f.id === editingId);
    if (i >= 0) state.fonts[i] = working; else state.fonts.push(working);
  } else state.fonts.push(working);
  state.selected = working.id;
  dirty = false;
  saveFonts(); renderFontList(); render();
  el('creator').classList.remove('open');
  working = null;
});
el('cprev').addEventListener('click', () => {
  const i = CREATOR_CHARS.indexOf(curChar);
  loadChar(CREATOR_CHARS[(i - 1 + CREATOR_CHARS.length) % CREATOR_CHARS.length]);
});
el('cnext').addEventListener('click', () => {
  const i = CREATOR_CHARS.indexOf(curChar);
  loadChar(CREATOR_CHARS[(i + 1) % CREATOR_CHARS.length]);
});
el('cundo').addEventListener('click', () => { curStrokes.pop(); dirty = true; refreshChips(); redrawCreator(); });
el('cclear').addEventListener('click', () => { curStrokes = []; dirty = true; refreshChips(); redrawCreator(); });
el('cpen').addEventListener('input', redrawCreator);

function drawPos(e){
  const r = dcv.getBoundingClientRect();
  return [(e.clientX - r.left) * (CW / r.width), (e.clientY - r.top) * (CH / r.height)];
}
dcv.addEventListener('pointerdown', e => {
  e.preventDefault();
  dcv.setPointerCapture(e.pointerId);
  liveStroke = [drawPos(e)];
  redrawCreator();
});
dcv.addEventListener('pointermove', e => {
  if (!liveStroke) return;
  const p = drawPos(e);
  const last = liveStroke[liveStroke.length - 1];
  if (Math.hypot(p[0] - last[0], p[1] - last[1]) >= 1.2){ liveStroke.push(p); redrawCreator(); }
});
function endStroke(){
  if (!liveStroke) return;
  curStrokes.push(liveStroke);
  liveStroke = null;
  dirty = true;
  refreshChips();
  redrawCreator();
}
dcv.addEventListener('pointerup', endStroke);
dcv.addEventListener('pointercancel', () => { liveStroke = null; redrawCreator(); });

/* ================= Backup / restore ================= */
el('backup').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify({ version: 1, settings: state.settings, selected: state.selected, text: state.text, fonts: state.fonts })], { type: 'application/json' });
  download(blob, 'handwriting-studio-config.json');
});
el('restore').addEventListener('click', () => el('restoreFile').click());
el('restoreFile').addEventListener('change', async e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  try {
    const cfg = JSON.parse(await file.text());
    if (!cfg || cfg.version !== 1 || !Array.isArray(cfg.fonts)) throw new Error('bad');
    if (!confirm('Replace current fonts and settings?')) return;
    for (const f of state.fonts) if (f.type === 'ttf') unregisterTTF(f.id);
    state.fonts = cfg.fonts;
    Object.assign(state.settings, cfg.settings || {});
    state.selected = cfg.selected || 'builtin';
    if (typeof cfg.text === 'string') state.text = cfg.text;
    for (const f of state.fonts) if (f.type === 'ttf') await registerTTF(f);
    if (state.selected !== 'builtin' && !state.fonts.some(f => f.id === state.selected)) state.selected = 'builtin';
    saveFonts(); applySettingsToUI(); renderFontList(); render();
  } catch(err){ alert('Not a valid backup file.'); }
});

/* ================= Settings wiring ================= */
const sliderLabel = {
  fontSize: v => v + ' pt', sizeVar: v => v + ' %', rotVar: v => v + '°',
  charSpacing: v => (+v).toFixed(2), wordSpace: v => v + ' pt',
};
function applySettingsToUI(){
  const s = state.settings;
  for (const id of ['fontSize','sizeVar','rotVar','charSpacing','wordSpace']){
    el(id).value = s[id];
    el(id + 'V').textContent = sliderLabel[id](s[id]);
  }
  el('ink').value = s.ink;
  el('showLines').checked = s.showLines;
  el('text').value = state.text;
  setActiveSwatch([...document.querySelectorAll('.sw')].find(b => b.dataset.c === s.ink) || null);
}
['fontSize','sizeVar','rotVar','charSpacing','wordSpace'].forEach(id => {
  el(id).addEventListener('input', () => {
    state.settings[id] = +el(id).value;
    el(id + 'V').textContent = sliderLabel[id](el(id).value);
    schedule();
  });
});
el('text').addEventListener('input', () => { state.text = el('text').value; schedule(); });
el('showLines').addEventListener('change', () => { state.settings.showLines = el('showLines').checked; render(); });
el('ink').addEventListener('input', () => { state.settings.ink = el('ink').value; setActiveSwatch(null); schedule(); });
function setActiveSwatch(node){
  document.querySelectorAll('.sw').forEach(b => b.classList.toggle('active', b === node));
}
document.querySelectorAll('.sw').forEach(b => {
  b.addEventListener('click', () => {
    state.settings.ink = b.dataset.c;
    el('ink').value = b.dataset.c;
    setActiveSwatch(b);
    render();
  });
});
el('reroll').addEventListener('click', () => { currentSeed = (Math.random() * 1e9) | 0; render(); });
el('png').addEventListener('click', () => {
  if (pageCanvases.length) pageCanvases[0].toBlob(b => download(b, 'handwriting-page1.png'), 'image/png');
});
el('pdf').addEventListener('click', () => {
  if (pageCanvases.length) download(buildPDF(pageCanvases), 'handwriting.pdf');
});

/* ================= Boot ================= */
loadState();
applySettingsToUI();
(async () => {
  for (const f of state.fonts){
    if (f.type === 'ttf'){
      try { await registerTTF(f); } catch(e){}
    }
  }
  renderFontList();
  try {
    await Promise.all([document.fonts.load('26px HW', 'Aa'), document.fonts.load('26px HWMath', '03√')]);
    await document.fonts.ready;
  } catch(e){}
  render();
})();
</script>
